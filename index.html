<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cashback</title>
</head>
<body>

  <h2>Calculadora de Cashback</h2>

  <input type="number" id="valor" placeholder="Valor da compra"><br><br>
  <input type="number" id="desconto" placeholder="Desconto (ex: 0.15)"><br><br>

  <label>
    <input type="checkbox" id="vip"> Cliente VIP
  </label><br><br>

  <button onclick="calcular()">Calcular</button>

  <h3 id="resultado"></h3>

  <script>
    async function calcular() {
      const valor = document.getElementById("valor").value;
      const desconto = document.getElementById("desconto").value;
      const vip = document.getElementById("vip").checked;

      const response = await fetch("cashback-app-production-9143.up.railway.app", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          valor: Number(valor),
          desconto: Number(desconto),
          vip: vip
        })
      });

      const data = await response.json();

      document.getElementById("resultado").innerText =
        `Você recebeu R$ ${data.cashback} de cashback!`;
    }
  </script>

</body>
</html>
